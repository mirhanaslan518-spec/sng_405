<!DOCTYPE html>
<html lang="en">

<head>
    <link rel="icon" type="image/png" href="icon.png">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather Website</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.1/css/all.min.css"
        integrity="sha512-5Hs3dF2AEPkpNAR7UiOHba+lRSJNeM2ECkwxUIxC1Q/FLycGTbNapWXB4tP889k5T5Ju8fs4b1P5z/iB4nMfSQ=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link rel="stylesheet" href="styles.css">
    <script src="scripts.js" defer></script>
</head>

<body>
    <div class="container">
        <h1><i class="fa-solid fa-cloud-sun"></i>Weather Website</h1>

        <form id="weatherForm">
            <input type="text" id="cityInput" placeholder="Enter a city name..." />
            <button type="submit">Search</button>
        </form>

        <div class="toggle-row">
            <span class="toggle-label">°C</span>
            <label class="switch">
                <input type="checkbox" id="unitToggle" />
                <span class="slider"></span>
            </label>
            <span class="toggle-label">°F</span>
        </div>

        <div id="weatherResults"></div>

        <hr />

        <div class="default-cities">
            <h3>Featured Cities</h3>
            <div class="city-cards">
                <div class="city-card" id="card-istanbul">Loading...</div>
                <div class="city-card" id="card-kyrenia">Loading...</div>
                <div class="city-card" id="card-london">Loading...</div>
            </div>
        </div>
    </div>
</body>

</html>
